// ---------- audio engine ----------
function makeNoise(ctx) {

}

}

  lp.frequency.value = 20000;
  lp.Q.value = 1.2;
  const hp = ctx.createBiquadFilter();
  hp.type = "highpass";
  hp.frequency.value = 12;
  hp.Q.value = 1.2;

  comp.knee.value = 20;
  comp.ratio.value = 4;
  comp.attack.value = 0.003;
  comp.release.value = 0.15;

  const vol = ctx.createGain();
  vol.gain.value = 0.7;

  shaper.connect(postDrive);
  postDrive.connect(lp);
  lp.connect(hp);
  hp.connect(comp);
  comp.connect(pump);
  pump.connect(vol);
  vol.connect(ctx.destination);

function noiseSrc(ctx, noise, t, dur) {

  osc.stop(t + 0.15);

    bp.frequency.value = 1500;
    bp.Q.value = 1.2;

  osc.connect(env(ctx, t, 0.5, 0.04)).connect(dest);
  osc.start(t);
  osc.stop(t + 0.06);

  bp.type = "bandpass";

    osc.stop(t + 0.15);

  osc.frequency.value = freq;

// parts = { drums: drumGrid|null, bass: notes|null, lead: notes|null, chord: notes|null }
function scheduleStepInto(e, parts, step, t, mutedMap, p) {
  if (parts.drums) TRACKS.forEach(({
    id

    if (parts.drums[id][step] && !mutedMap[id]) triggerDrum(e.ctx, e.noise, e.buses.drums.in, id, t);
  });
  if (parts.bass && parts.bass[step] !== null && !mutedMap.bass) synthBass(e.ctx, e.noise, e.buses.bass.in, t, BASS_NOTES[parts.bass[step]].f, p.cutoff, p.res, p.bassVoice);

// ---------- WAV encoding ----------
function bufferToWav(abuf) {
  const numCh = abuf.numberOfChannels,
    len = abuf.length * numCh * 2 + 44;
  const view = new DataView(new ArrayBuffer(len));
  const w = (o, s) => {
    for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i));
  };
  w(0, "RIFF");
  view.setUint32(4, len - 8, true);
  w(8, "WAVE");
  w(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, abuf.sampleRate, true);
  view.setUint32(28, abuf.sampleRate * numCh * 2, true);
  view.setUint16(32, numCh * 2, true);
  view.setUint16(34, 16, true);
  w(36, "data");
  view.setUint32(40, len - 44, true);
  let off = 44;
  const chans = Array.from({
    length: numCh
  }, (_, c) => abuf.getChannelData(c));
  for (let i = 0; i < abuf.length; i++) for (let c = 0; c < numCh; c++) {
    const s = Math.max(-1, Math.min(1, chans[c][i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    off += 2;
  }
  return new Blob([view], {
    type: "audio/wav"
  });
}
